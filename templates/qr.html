{% extends 'base.html' %}
{% block title %}QRコード{% endblock %}
{% block content %}

<h5 class="fw-bold mb-3"><i class="bi bi-qr-code me-2"></i>QRコードでログイン画面へ</h5>

<div class="card">
  <div class="card-body text-center">
    <p class="text-muted small mb-3">
      このQRコードをスマホのカメラで読み取ると、ログイン画面が開きます。<br>
      印刷して植物の近くに貼っておくと便利です。
    </p>

    <div class="d-flex justify-content-center my-3">
      <img src="data:image/png;base64,{{ qr_data }}" width="220" height="220" alt="ログイン用QRコード">
    </div>

    <form method="GET" class="input-group mb-2" style="max-width:420px;margin:0 auto;">
      <input type="text" name="url" class="form-control form-control-sm" value="{{ login_url }}">
      <button class="btn btn-outline-secondary btn-sm" type="submit">
        <i class="bi bi-arrow-clockwise"></i> 更新
      </button>
    </form>
    <div class="form-text">
      スマホがこのURLにアクセスできない場合は、社内Wi-Fiに接続しているか、上のアドレスが正しいかご確認ください。
    </div>
  </div>
</div>

{% endblock %}
