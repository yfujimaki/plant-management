<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン | NICHIRO 植物管理システム</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #2f5a3f 0%, #4c9a6a 100%); min-height: 100vh; }
    .login-card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center">
  <div class="col-12 col-sm-8 col-md-5 col-lg-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} mb-3">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card login-card">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <i class="bi bi-flower2 text-success" style="font-size:2.5rem"></i>
          <h4 class="fw-bold mt-2 mb-0">植物管理システム</h4>
          <small class="text-muted">NICHIRO株式会社</small>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">登録者</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <select name="username" class="form-select" required autofocus>
                <option value="" disabled selected>選択してください</option>
                {% for u in users %}
                <option value="{{ u.username }}">{{ u.display_name }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">パスワード</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="password" required>
            </div>
          </div>
          <button type="submit" class="btn btn-success w-100 py-2 fw-bold">
            <i class="bi bi-box-arrow-in-right me-2"></i>ログイン
          </button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
